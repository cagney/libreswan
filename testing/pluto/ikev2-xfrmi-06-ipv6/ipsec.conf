# /etc/ipsec.conf - Libreswan IPsec configuration file

config setup
	logfile=/tmp/pluto.log
	logtime=no
	logappend=no
	plutodebug="all"
	dumpdir=/tmp

conn eastnet-road
	rightid=@east
	leftid=@road
	authby=secret
	left=%any
	right=2001:db8:1:2::23
	rightsubnet=::/0
	narrowing=yes
	leftaddresspool=2001:db8:0:2::/120
	#modecfgdns="1.2.3.4, 8.8.8.8"
	ipsec-interface=yes

conn road
        leftid=@road
        rightid=@east
        authby=secret
        left=%defaultroute
        right=2001:db8:1:2::23
        narrowing=yes
	rightsubnet=::/0
        leftmodecfgclient=yes
	ipsec-interface=yes
